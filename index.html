<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesFlow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#F7F8FA;
  --card:#FFFFFF;
  --border:#E5E7EB;
  --text:#111827;
  --text2:#6B7280;
  --text3:#9CA3AF;
  --accent:#2563EB;
  --accent-dark:#1E3A8A;
  --accent-light:#EFF6FF;
  --success:#22C55E;
  --success-light:#F0FDF4;
  --warning:#F59E0B;
  --warning-light:#FFFBEB;
  --error:#EF4444;
  --error-light:#FEF2F2;
  --info:#3B82F6;
  --radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.04);
}

[data-theme="dark"]{
  --bg:#0F172A;
  --card:#1E293B;
  --border:#334155;
  --text:#F8FAFC;
  --text2:#94A3B8;
  --text3:#64748B;
  --accent:#3B82F6;
  --accent-dark:#2563EB;
  --accent-light:rgba(59,130,246,.1);
  --success-light:rgba(34,197,94,.1);
  --warning-light:rgba(245,158,11,.1);
  --error-light:rgba(239,68,68,.1);
  --shadow:0 1px 3px rgba(0,0,0,.3);
  --shadow-md:0 4px 6px rgba(0,0,0,.3);
  --shadow-lg:0 10px 15px rgba(0,0,0,.3);
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

/* HEADER */
.header{height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--accent-dark);}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.nav{display:flex;gap:2px;}
.nav-btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;transition:all .15s;font-family:'Inter',sans-serif;}
.nav-btn:hover{color:var(--text);background:var(--bg);}
.nav-btn.active{color:var(--accent);background:var(--accent-light);font-weight:600;}
.header-right{display:flex;align-items:center;gap:8px;}
.h-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sdot.ok{background:var(--success);}
.sdot.err{background:var(--error);}
.sdot.load{background:var(--warning);animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.h-btn{height:32px;padding:0 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s;}
.h-btn:hover{border-color:var(--accent);color:var(--accent);}
.h-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.h-btn.primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);}
.theme-toggle{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.theme-toggle:hover{border-color:var(--accent);}

/* MAIN */
.main{padding:24px;max-width:1280px;margin:0 auto;}

/* PAGE TITLE */
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);transition:box-shadow .15s;}
.kpi:hover{box-shadow:var(--shadow-md);}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.kpi-label{font-size:12px;font-weight:500;color:var(--text2);}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.ki-blue{background:var(--accent-light);}
.ki-green{background:var(--success-light);}
.ki-orange{background:var(--warning-light);}
.ki-red{background:var(--error-light);}
.kpi-val{font-size:28px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px;}
.kpi-sub{font-size:11px;color:var(--text3);}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;margin-top:6px;padding:2px 6px;border-radius:4px;}
.trend-up{background:var(--success-light);color:var(--success);}
.trend-down{background:var(--error-light);color:var(--error);}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.card-title-sub{font-size:11px;color:var(--text3);font-weight:400;}

/* CAT CARDS */
.cat3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.catc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.catc-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.catc-val{font-size:26px;font-weight:700;color:var(--text);margin-bottom:2px;}
.catc-sub{font-size:11px;color:var(--text3);}

/* PROGRESS */
.prog-item{margin-bottom:14px;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prog-name{font-size:13px;font-weight:500;color:var(--text);}
.prog-vals{font-size:12px;color:var(--text2);}
.prog-pct{font-size:12px;font-weight:600;}
.prog-track{height:6px;background:var(--border);border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width 1s cubic-bezier(.16,1,.3,1);}
.pf-blue{background:var(--accent);}
.pf-green{background:var(--success);}
.pf-orange{background:var(--warning);}

/* RANKING */
.rank-row{display:grid;grid-template-columns:28px 1fr 60px 60px auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.rank-row:last-child{border-bottom:none;}
.rank-row.rhdr{color:var(--text3);font-size:11px;font-weight:500;padding-bottom:8px;}
.rank-num{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.rn1{background:#FEF9C3;color:#92400E;}
.rn2{background:#F1F5F9;color:#475569;}
.rn3{background:#FEF3C7;color:#92400E;}
.rnx{background:var(--bg);color:var(--text3);}
.rank-name{font-size:13px;font-weight:500;color:var(--text);}
.rank-num-cell{text-align:center;font-size:13px;font-weight:600;color:var(--text);}
.cat-pills{display:flex;gap:4px;flex-wrap:wrap;}
.pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.pill-z{background:var(--accent-light);color:var(--accent);}
.pill-g{background:var(--success-light);color:#16A34A;}
.pill-m{background:var(--warning-light);color:#D97706;}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:90px;margin-top:8px;}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height 1s cubic-bezier(.16,1,.3,1);min-height:2px;cursor:pointer;}
.bar:hover{opacity:.8;}
.blbl{font-size:10px;color:var(--text3);font-weight:500;}
.bnum{font-size:10px;font-weight:600;color:var(--text2);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty p{font-size:13px;}

/* ===== DAILY ASSISTANT ===== */
.day-wrap{max-width:760px;margin:0 auto;}

/* START */
.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:24px;text-align:center;}
.start-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;box-shadow:var(--shadow-lg);}
.start-avatar{width:64px;height:64px;background:var(--accent-light);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.start-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;}
.start-date{font-size:13px;color:var(--text2);margin-bottom:24px;}
.start-input-wrap{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;text-align:left;}
.start-input-wrap label{font-size:12px;font-weight:500;color:var(--text2);}
.start-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border .15s;}
.start-input:focus{border-color:var(--accent);}
.start-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.start-btn:hover{background:var(--accent-dark);}

/* WORK PANEL */
.work-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.work-greeting{font-size:18px;font-weight:700;color:var(--text);}
.work-time{font-size:12px;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;}

/* TIP */
.tip-card{background:var(--accent-light);border:1px solid rgba(37,99,235,.15);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start;min-height:60px;}
.tip-icon{font-size:20px;margin-top:1px;flex-shrink:0;}
.tip-label{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.tip-text{font-size:13px;color:var(--text);line-height:1.5;transition:opacity .25s;}

/* ACTIVITIES */
.act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.act-btn{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all .15s;}
.act-btn:hover{border-color:var(--accent);box-shadow:var(--shadow-md);}
.act-btn.active-act{border-color:var(--accent);background:var(--accent-light);box-shadow:var(--shadow-md);}
.act-icon{font-size:20px;margin-bottom:5px;}
.act-name{font-size:11px;font-weight:600;color:var(--text2);}
.act-btn.active-act .act-name{color:var(--accent);}
.act-timer{font-size:14px;font-weight:700;color:var(--text);margin-top:3px;font-variant-numeric:tabular-nums;}
.act-btn.active-act .act-timer{color:var(--accent);}

/* COUNTERS */
.counters{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.cnt-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
.cnt-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.cnt-val{font-size:40px;font-weight:700;color:var(--text);line-height:1;margin-bottom:10px;}
.cnt-val.cv-blue{color:var(--accent);}
.cnt-val.cv-green{color:var(--success);}
.cnt-row{display:flex;gap:6px;justify-content:center;}
.cnt-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:18px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.cnt-btn:hover{border-color:var(--accent);color:var(--accent);}
.cnt-btn.add{background:var(--accent);color:#fff;border-color:var(--accent);}
.cnt-btn.add:hover{background:var(--accent-dark);}

/* END BTN */
.end-day-btn{width:100%;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.end-day-btn:hover{opacity:.85;}

/* SUMMARY */
.sum-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.sum-kpi-item{background:var(--bg);border-radius:8px;padding:12px;text-align:center;}
.sum-kpi-val{font-size:22px;font-weight:700;color:var(--text);}
.sum-kpi-label{font-size:10px;color:var(--text2);font-weight:500;margin-top:2px;}
.act-time-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.act-time-row:last-child{border-bottom:none;}
.atr-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--text);}
.atr-right{font-size:13px;font-weight:600;color:var(--accent);}
.atr-bar{height:3px;background:var(--border);border-radius:3px;margin-top:3px;overflow:hidden;}
.atr-fill{height:100%;border-radius:3px;background:var(--accent);}
.sum-sale-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0;}
.sum-sale-item{display:flex;flex-direction:column;gap:4px;}
.sum-sale-item label{font-size:11px;font-weight:500;color:var(--text2);}
.sum-sale-input{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;text-align:center;font-weight:600;}
.sum-sale-input:focus{border-color:var(--accent);}

/* KWARTAŁ */
.q-agent-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);}
.q-agent-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.q-agent-name{font-size:14px;font-weight:600;color:var(--text);}
.q-agent-pts{font-size:13px;font-weight:600;color:var(--accent);}
.q-pct-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;}
.qb-ok{background:var(--success-light);color:var(--success);}
.qb-mid{background:var(--accent-light);color:var(--accent);}
.qb-low{background:var(--warning-light);color:var(--warning);}
.q-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:6px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:440px;max-width:95vw;box-shadow:var(--shadow-lg);transform:translateY(12px);transition:transform .2s;}
.overlay.show .modal{transform:translateY(0);}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:20px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:11px;font-weight:500;color:var(--text2);}
.fg input,.fg select{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border .15s;}
.fg input:focus,.fg select:focus{border-color:var(--accent);}
.form-sep{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px;padding-top:12px;border-top:1px solid var(--border);}
.modal-btns{display:flex;gap:8px;margin-top:20px;}
.mbtn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);font-family:'Inter',sans-serif;transition:all .15s;}
.mbtn.cancel{background:var(--bg);color:var(--text2);}
.mbtn.cancel:hover{color:var(--text);}
.mbtn.save{background:var(--accent);color:#fff;border-color:var(--accent);}
.mbtn.save:hover{background:var(--accent-dark);}

/* WPISY */
.entry-row{display:grid;grid-template-columns:88px 1fr 55px 55px 1fr auto auto;gap:8px;align-items:center;padding:9px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;font-size:12px;}
.action-btn{background:none;border:1px solid var(--border);cursor:pointer;font-size:11px;padding:3px 9px;border-radius:5px;font-family:'Inter',sans-serif;font-weight:500;color:var(--text2);transition:all .15s;}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.danger:hover{border-color:var(--error);color:var(--error);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:400;white-space:nowrap;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.cfw{position:fixed;inset:0;pointer-events:none;z-index:999;}
.cfp{position:absolute;top:-20px;animation:cff linear forwards;}
@keyframes cff{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0;}}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:13px;color:var(--text2);}
</style>
</head>
<body>
<div class="cfw" id="cfw"></div>
<div class="toast" id="toast"></div>

<!-- MODAL ENTRY -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Dodaj wyniki</div>
    <div class="form-row">
      <div class="fg"><label>Data</label><input type="date" id="fDate"></div>
      <div class="fg"><label>Agent</label><input type="text" id="fAgent" placeholder="Imię i nazwisko"></div>
    </div>
    <div class="form-sep">Aktywność</div>
    <div class="form-row">
      <div class="fg"><label>Telefony</label><input type="number" id="fTel" min="0" value="0"></div>
      <div class="fg"><label>Spotkania</label><input type="number" id="fSpot" min="0" value="0"></div>
    </div>
    <div class="form-sep">Sprzedaż</div>
    <div class="form-row">
      <div class="fg"><label>Życie</label><input type="number" id="fZycie" min="0" value="0"></div>
      <div class="fg"><label>Grupowe</label><input type="number" id="fGrup" min="0" value="0"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Majątek</label><input type="number" id="fMaj" min="0" value="0"></div>
      <div class="fg"><label>Notatka</label><input type="text" id="fNote" placeholder="opcjonalnie"></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">Anuluj</button>
      <button class="mbtn save" id="saveBtn" onclick="saveEntry()">Zapisz</button>
    </div>
  </div>
</div>

<!-- MODAL KWARTAŁ -->
<div class="overlay" id="qoverlay">
  <div class="modal">
    <div class="modal-title">Produktywność kwartalna</div>
    <div class="form-row">
      <div class="fg full"><label>Agent</label><input type="text" id="qAgent" list="agentList"><datalist id="agentList"></datalist></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Kwartał</label>
        <select id="qQuarter">
          <option value="Q1 2026">Q1 2026</option>
          <option value="Q2 2026" selected>Q2 2026</option>
          <option value="Q3 2026">Q3 2026</option>
          <option value="Q4 2026">Q4 2026</option>

function getCurrentQuarter(){const m=new Date().getMonth();return `Q${Math.floor(m/3)+1} ${new Date().getFullYear()}`;}
function getRemainingDays(){const now=new Date();const qEnd=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3+3,0);return Math.max(0,Math.ceil((qEnd-now)/864e5));}

function renderKwartal(){
  const cq=getCurrentQuarter();
  const qData=qEntries.filter(e=>e.quarter===cq).sort((a,b)=>b.pts-a.pts);

  const avg=qData.length?Math.round(tot/qData.length):0;

  document.getElementById('main').innerHTML=`

    <div class="card">
      <div class="card-title">Ranking kwartalny — ${cq} <button class="h-btn" onclick="openQModal()">+ Dodaj / aktualizuj</button></div>
      ${qData.length?qData.map((e,i)=>{
        const pct=Math.min(Math.round(e.pts/Q_GOAL*100),100);
        const bc=pct>=100?'var(--success)':pct>=60?'var(--accent)':'var(--warning)';

          <div class="q-footer"><span style="color:${pct>=100?'var(--success)':'var(--text3)'}">${pct>=100?'✓ Cel osiągnięty!':'Brakuje: '+(Q_GOAL-e.pts).toLocaleString()+' pkt'}</span><span>~${getRemainingDays()} dni do końca kwartału</span></div>

let expandedEntry=null;

function toggleEntry(id){expandedEntry=expandedEntry===id?null:id;renderEntries();}

function renderEntries(){
  const sorted=[...entries].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const actDefs=[
    {key:'act_zimna',icon:'❄️',name:'Zimna Baza'},
    {key:'act_reklamowana',icon:'🔄',name:'Baza Reklamowana'},
    {key:'act_leady',icon:'🎯',name:'Leady'},
    {key:'act_grupowka',icon:'👥',name:'Pod Grupówkę'},
    {key:'act_stare',icon:'📋',name:'Stare Kontakty'},
    {key:'act_przerwa',icon:'☕',name:'Przerwa'},
  ];

  document.getElementById('main').innerHTML=`
    <div class="page-title">Wszystkie wpisy</div>
    <div class="page-sub">${sorted.length} rekordów w bazie danych</div>
    <div class="card">
      ${sorted.length?sorted.map(e=>{
        const hasDetail=e.start_time||actDefs.some(a=>e[a.key]>0);
        const totalActSec=actDefs.reduce((s,a)=>s+(e[a.key]||0),0);
        const maxAct=Math.max(...actDefs.map(a=>e[a.key]||0),1);
        const isExpanded=expandedEntry===e.id;
        return `
        <div style="border-bottom:1px solid var(--border);padding:10px 0;">
          <div style="display:grid;grid-template-columns:88px 1fr 55px 55px 1fr auto auto auto;gap:8px;align-items:center;font-size:12px;">
            <span style="color:var(--text2);font-size:11px">${e.date}</span>
            <div>
              <div style="font-weight:500;font-size:13px">${e.agent}</div>
              ${e.start_time?`<div style="font-size:10px;color:var(--text3)">🕐 ${e.start_time}${e.end_time?' — '+e.end_time:''}</div>`:''}
            </div>
            <span style="text-align:center;color:var(--accent);font-weight:600">${e.tel} tel</span>
            <span style="text-align:center;color:var(--success);font-weight:600">${e.spot} spot</span>
            <div class="cat-pills">
              ${e.zycie?`<span class="pill pill-z">Ż:${e.zycie}</span>`:''}
              ${e.grup?`<span class="pill pill-g">G:${e.grup}</span>`:''}
              ${e.maj?`<span class="pill pill-m">M:${e.maj}</span>`:''}
            </div>
            ${hasDetail?`<button class="action-btn" onclick="toggleEntry(${e.id})" style="${isExpanded?'color:var(--accent);border-color:var(--accent)':''}">${isExpanded?'Zwiń ▲':'Szczegóły ▼'}</button>`:'<div></div>'}

            <button class="action-btn danger" onclick="checkAdmin(()=>deleteEntry(${e.id}))">Usuń</button>

          ${isExpanded&&hasDetail?`
          <div style="margin:10px 0 4px;background:var(--bg);border-radius:10px;padding:14px 16px;">
            <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Czas per aktywność</div>
            ${actDefs.filter(a=>e[a.key]>0).sort((a,b)=>(e[b.key]||0)-(e[a.key]||0)).map(a=>{
              const sec=e[a.key]||0;
              const pct=Math.round(sec/maxAct*100);
              const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
              const timeStr=h>0?`${h}h ${m}m`:`${m}m ${s}s`;
              const totalPct=totalActSec>0?Math.round(sec/totalActSec*100):0;
              return `
              <div style="margin-bottom:10px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                  <span style="font-size:12px;font-weight:500;color:var(--text)">${a.icon} ${a.name}</span>
                  <div style="display:flex;gap:10px;align-items:center;">
                    <span style="font-size:11px;color:var(--text3)">${totalPct}% czasu</span>
                    <span style="font-size:12px;font-weight:600;color:var(--accent)">${timeStr}</span>
                  </div>
                </div>
                <div style="height:5px;background:var(--border);border-radius:4px;overflow:hidden;">
                  <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:4px;"></div>
                </div>
              </div>`;
            }).join('')}
            ${totalActSec>0?`<div style="font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">Łączny czas pracy: <strong style="color:var(--text)">${Math.floor(totalActSec/3600)}h ${Math.floor((totalActSec%3600)/60)}m</strong></div>`:''}
          </div>`:''}
        </div>`;
      }).join(''):'<div class="empty"><div class="empty-icon">📋</div><p>Brak wpisów</p></div>'}
    </div>`;
}

// CRUD
async function saveEntry(){
  const date=document.getElementById('fDate').value,agent=document.getElementById('fAgent').value.trim();
  if(!date||!agent){showToast('Uzupełnij datę i agenta');return;}
  const data={date,agent,tel:+document.getElementById('fTel').value||0,spot:+document.getElementById('fSpot').value||0,zycie:+document.getElementById('fZycie').value||0,grup:+document.getElementById('fGrup').value||0,maj:+document.getElementById('fMaj').value||0,note:document.getElementById('fNote').value};
  document.getElementById('saveBtn').textContent='Zapisuję...';
  try{
    if(editingId){await fetch(`${SB_URL}/rest/v1/entries?id=eq.${editingId}`,{method:'PATCH',headers:H,body:JSON.stringify(data)});showToast('Zaktualizowano ✓');}
    else{await fetch(`${SB_URL}/rest/v1/entries`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(data)});showToast('Zapisano ✓');if(data.zycie+data.grup+data.maj>0)setTimeout(confetti,300);}
    closeModal();await loadAll();
  }catch(e){showToast('Błąd: '+e.message);document.getElementById('saveBtn').textContent='Zapisz';}
}
async function saveQEntry(){
  const agent=document.getElementById('qAgent').value.trim(),quarter=document.getElementById('qQuarter').value,pts=+document.getElementById('qPts').value||0;
  if(!agent||!pts){showToast('Uzupełnij pola');return;}
  try{
    const ex=qEntries.find(e=>e.agent===agent&&e.quarter===quarter);
    if(ex)await fetch(`${SB_URL}/rest/v1/q_entries?id=eq.${ex.id}`,{method:'PATCH',headers:H,body:JSON.stringify({pts})});
    else await fetch(`${SB_URL}/rest/v1/q_entries`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({agent,quarter,pts})});
    showToast('Zapisano ✓');if(pts>=Q_GOAL)setTimeout(confetti,300);
    closeQModal();await loadAll();
  }catch(e){showToast('Błąd: '+e.message);}
}
async function deleteEntry(id){await fetch(`${SB_URL}/rest/v1/entries?id=eq.${id}`,{method:'DELETE',headers:H});showToast('Usunięto');await loadAll();}
async function deleteQEntry(id){await fetch(`${SB_URL}/rest/v1/q_entries?id=eq.${id}`,{method:'DELETE',headers:H});showToast('Usunięto');await loadAll();}

function checkAdmin(a){if(isAdmin){a();return;}const p=prompt('PIN admina:');if(p===ADMIN_PIN){isAdmin=true;showToast('Tryb admina aktywny');a();}else if(p!==null)showToast('Nieprawidłowy PIN');}
function openModal(){editingId=null;document.getElementById('modalTitle').textContent='Dodaj wyniki';document.getElementById('saveBtn').textContent='Zapisz';document.getElementById('fDate').value=new Date().toISOString().split('T')[0];document.getElementById('fAgent').value='';['fTel','fSpot','fZycie','fGrup','fMaj'].forEach(id=>document.getElementById(id).value=0);document.getElementById('fNote').value='';document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function editEntry(id){const e=entries.find(x=>x.id===id);if(!e)return;editingId=id;document.getElementById('modalTitle').textContent='Edytuj wpis';document.getElementById('saveBtn').textContent='Zaktualizuj';document.getElementById('fDate').value=e.date;document.getElementById('fAgent').value=e.agent;document.getElementById('fTel').value=e.tel;document.getElementById('fSpot').value=e.spot;document.getElementById('fZycie').value=e.zycie;document.getElementById('fGrup').value=e.grup;document.getElementById('fMaj').value=e.maj;document.getElementById('fNote').value=e.note||'';document.getElementById('overlay').classList.add('show');}
function openQModal(a=''){const agents=[...new Set(entries.map(e=>e.agent))];document.getElementById('agentList').innerHTML=agents.map(x=>`<option value="${x}">`).join('');document.getElementById('qAgent').value=a;document.getElementById('qPts').value=a?qEntries.find(e=>e.agent===a&&e.quarter===getCurrentQuarter())?.pts||'':'';document.getElementById('qoverlay').classList.add('show');}
function closeQModal(){document.getElementById('qoverlay').classList.remove('show');}

['overlay','qoverlay','summaryOverlay'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById(id).classList.remove('show');});});

  renderAIMessages();
}

function renderAIMessages() {
  const list = document.getElementById('ai-messages');
  if(!list) return;
  list.innerHTML = aiMessages.map(m => `
    <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:12px;${m.role==='user'?'flex-direction:row-reverse':''}">
      <div style="width:28px;height:28px;border-radius:50%;background:${m.role==='assistant'?'var(--accent)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">
        ${m.role==='assistant'?'🤖':'👤'}
      </div>
      <div style="max-width:80%;background:${m.role==='assistant'?'var(--accent-light)':'var(--bg)'};border:1px solid ${m.role==='assistant'?'rgba(37,99,235,.15)':'var(--border)'};border-radius:${m.role==='assistant'?'4px 12px 12px 12px':'12px 4px 12px 12px'};padding:10px 13px;font-size:13px;color:var(--text);line-height:1.5;">
        ${m.content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
      </div>
    </div>
  `).join('') + (aiTyping ? `
    <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:12px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;">🤖</div>
      <div style="background:var(--accent-light);border:1px solid rgba(37,99,235,.15);border-radius:4px 12px 12px 12px;padding:10px 13px;">
        <div style="display:flex;gap:4px;align-items:center;">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink .8s infinite;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink .8s .2s infinite;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink .8s .4s infinite;"></div>
        </div>
      </div>
    </div>` : '');
  list.scrollTop = list.scrollHeight;
}

async function sendAIMessage() {
  const input = document.getElementById('ai-input');
  if(!input || aiTyping) return;
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addAIMessage('user', text);
  aiTyping = true;
  renderAIMessages();

  try {
    const messages = [
      ...aiMessages.slice(0,-1).map(m => ({role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content})),
      {role: 'user', content: (agentName ? `[Agent: ${agentName}] ` : '') + text}
    ];

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: AI_SYSTEM,
        messages
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Przepraszam, spróbuj ponownie.';
    aiTyping = false;
    addAIMessage('assistant', reply);
  } catch(e) {
    aiTyping = false;
    addAIMessage('assistant', 'Błąd połączenia z AI. Sprawdź internet i spróbuj ponownie.');
    renderAIMessages();
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function confetti(){const w=document.getElementById('cfw');const cols=['#2563EB','#22C55E','#F59E0B','#EF4444','#7C3AED','#0891B2'];for(let i=0;i<60;i++){const el=document.createElement('div');el.className='cfp';const c=cols[Math.floor(Math.random()*cols.length)];el.style.cssText=`left:${Math.random()*100}%;width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;background:${c};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.4}s;`;w.appendChild(el);setTimeout(()=>el.remove(),3000);}}

async function silentRefresh(){
  if(!isLoggedIn) return;
  try{
    const[e,q]=await Promise.all([
      fetch(`${SB_URL}/rest/v1/entries?order=date.desc&limit=500`,{headers:H}).then(r=>r.json()),
      fetch(`${SB_URL}/rest/v1/q_entries?order=pts.desc`,{headers:H}).then(r=>r.json())
    ]);
    entries=Array.isArray(e)?e:[];
    qEntries=Array.isArray(q)?q:[];
    setStatus('ok',entries.length+' wpisów');
    // odswież widok tylko jeśli nie jesteś w Moim Dniu
    if(view!=='dzien_pracy') render();
  }catch(e){ setStatus('err','Brak połączenia'); }
}

if(!checkLogin()){renderLogin();}else{loadAll();setInterval(silentRefresh,30000);}
